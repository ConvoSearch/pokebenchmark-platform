services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - ./roms:/app/roms
      - ./saves:/app/saves
      - ./skills:/app/skills
    env_file:
      - .env
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./roms:/app/roms
      - ./saves:/app/saves
      - ./skills:/app/skills
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["python", "-m", "pokebenchmark_platform.orchestrator"]

  # Game session containers are spawned dynamically by the orchestrator
